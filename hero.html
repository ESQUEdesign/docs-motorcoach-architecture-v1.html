<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Motorcoach Store — Hero</title>
<style>
/* ====================================================================
   HERO — ten motorcoaches arranged like the face of a clock.
   White ground · top-view coaches · no clock indicators (no ticks/numbers).
   Coaches are a single embedded SVG (top view) cloned 10× and placed at
   36° intervals so the file renders identically online or offline.
   Palette/type aligned to the TMCS brand book (champagne gold #B79B5D).
   ==================================================================== */
@font-face{font-family:'Bosca';font-weight:400;font-display:swap;
  src:url('https://47169059.fs1.hubspotusercontent-na1.net/hubfs/47169059/raw_assets/public/motorcoach-theme/fonts/Bosca/Bosca-Regular.woff2') format('woff2');}
@font-face{font-family:'Bosca';font-weight:500;font-display:swap;
  src:url('https://47169059.fs1.hubspotusercontent-na1.net/hubfs/47169059/raw_assets/public/motorcoach-theme/fonts/Bosca/Bosca-Medium.woff2') format('woff2');}

:root{
  --accent:#B79B5D;      /* brand champagne gold */
  --accent-2:#DFC16F;    /* secondary gold */
  --accent-dk:#8A7338;   /* deepened gold for AA text on white */
  --ink:#0E0E0E;
  --white:#FFFFFF;
  --display:'Bosca',Georgia,'Times New Roman',serif;

  /* Geometry — 1em == 1% of the circle's diameter, so every part scales
     together. Circle diameter clamps to the viewport's short side. */
  --D:min(90vmin,820px);
  --R:30em;              /* orbit radius (% of diameter) */
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--display);
  background:var(--white);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}

/* The hero rectangle */
.hero{
  position:relative;
  width:100%;
  min-height:100vh;
  background:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* The clock-face circle */
.clock{
  position:relative;
  width:var(--D);
  height:var(--D);
  font-size:calc(var(--D)/100);   /* makes 1em == 1% of the diameter */
}

/* Rotating ring that carries the ten coaches */
.ring{
  position:absolute;
  inset:0;
  animation:spin 150s linear infinite;
  transform-origin:50% 50%;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* One coach. Centred on the hub, rotated to its clock slot, then pushed
   out along the radius so the nose points outward. */
.coach{
  position:absolute;
  left:50%;top:50%;
  width:9em;height:34em;        /* ~1:3.8, true coach proportion */
  transform:translate(-50%,-50%) rotate(var(--a)) translateY(calc(-1 * var(--R)));
  filter:drop-shadow(0 1.2em 1.4em rgba(20,16,6,.16));
}
/* Ten slots, 36° apart — like the numerals on a clock face */
.coach:nth-child(1){--a:0deg;}
.coach:nth-child(2){--a:36deg;}
.coach:nth-child(3){--a:72deg;}
.coach:nth-child(4){--a:108deg;}
.coach:nth-child(5){--a:144deg;}
.coach:nth-child(6){--a:180deg;}
.coach:nth-child(7){--a:216deg;}
.coach:nth-child(8){--a:252deg;}
.coach:nth-child(9){--a:288deg;}
.coach:nth-child(10){--a:324deg;}

/* Static hub wordmark — stays upright while the ring turns */
.hub{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:46em;
  pointer-events:none;
}
.hub::before{                 /* soft white halo keeps the wordmark legible */
  content:"";
  position:absolute;
  left:50%;top:50%;
  width:60em;height:42em;
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at center,
            rgba(255,255,255,.96) 38%,rgba(255,255,255,.78) 56%,rgba(255,255,255,0) 76%);
  z-index:-1;
}
.hub .mark{
  font-family:var(--display);
  font-weight:500;
  font-size:6.6em;
  line-height:1.05;
  letter-spacing:.01em;
  color:var(--ink);
}
.hub .mark em{font-style:italic;color:var(--accent-dk);}
.hub .rule{
  width:9em;height:1px;margin:2.2em auto 1.8em;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.hub .domain{
  font-family:var(--display);
  font-size:2.5em;
  letter-spacing:.42em;
  text-transform:uppercase;
  color:var(--accent-dk);
  padding-left:.42em;       /* optical balance for tracking */
}

@media (prefers-reduced-motion:reduce){
  .ring{animation:none;}
}

/* ---- Hidden master: the top-view motorcoach, drawn once ---- */
.defs{position:absolute;width:0;height:0;overflow:hidden;}
</style>
</head>
<body>

<!-- Top-view motorcoach, authored once and reused 10× -->
<svg class="defs" aria-hidden="true">
  <symbol id="coach" viewBox="0 0 100 380">
    <defs>
      <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#A98C4E"/>
        <stop offset=".16" stop-color="#D9C488"/>
        <stop offset=".50" stop-color="#EBDDB0"/>
        <stop offset=".84" stop-color="#D9C488"/>
        <stop offset="1"   stop-color="#A98C4E"/>
      </linearGradient>
      <linearGradient id="roof" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#CDB778"/>
        <stop offset=".5"  stop-color="#E4D4A2"/>
        <stop offset="1"   stop-color="#CDB778"/>
      </linearGradient>
      <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"   stop-color="#0C0E12"/>
        <stop offset=".45" stop-color="#23282F"/>
        <stop offset=".6"  stop-color="#3A4048"/>
        <stop offset="1"   stop-color="#101319"/>
      </linearGradient>
    </defs>

    <!-- side mirrors (protruding near the front) -->
    <g fill="#6E5B2E">
      <rect x="-6" y="54" width="12" height="5" rx="2.5"/>
      <rect x="94" y="54" width="12" height="5" rx="2.5"/>
      <rect x="-9" y="50" width="6"  height="11" rx="3" fill="#15161A"/>
      <rect x="103" y="50" width="6" height="11" rx="3" fill="#15161A"/>
    </g>

    <!-- body shell -->
    <path d="M50 2
             C72 2 86 14 88 40
             L88 344
             C88 366 74 378 50 378
             C26 378 12 366 12 344
             L12 40
             C14 14 28 2 50 2 Z"
          fill="url(#body)" stroke="#7E682F" stroke-width="1.3"/>

    <!-- raised roof panel -->
    <path d="M50 30
             C66 30 76 40 77 56
             L77 330
             C77 346 65 354 50 354
             C35 354 23 346 23 330
             L23 56
             C24 40 34 30 50 30 Z"
          fill="url(#roof)" stroke="#B79B5D" stroke-width=".8" opacity=".95"/>

    <!-- windshield (dark glass, at the nose) -->
    <path d="M50 6
             C68 6 82 17 84 38
             C72 30 60 27 50 27
             C40 27 28 30 16 38
             C18 17 32 6 50 6 Z"
          fill="url(#glass)"/>
    <!-- wiper hints -->
    <path d="M38 24 L30 15 M52 24 L44 14" stroke="#5A4D2A" stroke-width="1" opacity=".5"/>

    <!-- passenger side glazing (thin tinted strips both sides) -->
    <rect x="19" y="64" width="4.6" height="250" rx="2.3" fill="url(#glass)" opacity=".92"/>
    <rect x="76.4" y="64" width="4.6" height="250" rx="2.3" fill="url(#glass)" opacity=".92"/>

    <!-- roof-mounted A/C unit -->
    <rect x="33" y="92" width="34" height="60" rx="5" fill="#EFEEE9" stroke="#BFB89F" stroke-width=".8"/>
    <g stroke="#C7C0A6" stroke-width="1">
      <line x1="38" y1="104" x2="62" y2="104"/>
      <line x1="38" y1="112" x2="62" y2="112"/>
      <line x1="38" y1="120" x2="62" y2="120"/>
      <line x1="38" y1="128" x2="62" y2="128"/>
      <line x1="38" y1="136" x2="62" y2="136"/>
    </g>

    <!-- roof escape hatches -->
    <g fill="#EBE7DA" stroke="#BCAF82" stroke-width=".8">
      <rect x="40" y="186" width="20" height="20" rx="3"/>
      <rect x="40" y="246" width="20" height="20" rx="3"/>
    </g>
    <g stroke="#C9BC8E" stroke-width=".8">
      <line x1="50" y1="186" x2="50" y2="206"/>
      <line x1="40" y1="196" x2="60" y2="196"/>
      <line x1="50" y1="246" x2="50" y2="266"/>
      <line x1="40" y1="256" x2="60" y2="256"/>
    </g>

    <!-- rear engine louvres -->
    <g stroke="#8A7338" stroke-width="1.4" opacity=".7">
      <line x1="34" y1="332" x2="66" y2="332"/>
      <line x1="34" y1="340" x2="66" y2="340"/>
      <line x1="34" y1="348" x2="66" y2="348"/>
    </g>

    <!-- centre ridge highlight -->
    <line x1="50" y1="40" x2="50" y2="320" stroke="#FBF4DF" stroke-width="1.2" opacity=".45"/>
  </symbol>
</svg>

<section class="hero">
  <div class="clock">
    <div class="ring">
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
      <svg class="coach"><use href="#coach"/></svg>
    </div>

    <div class="hub">
      <div class="mark">The Motorcoach<br><em>Store</em></div>
      <div class="rule"></div>
      <div class="domain">TheMotorcoachStore.com</div>
    </div>
  </div>
</section>

</body>
</html>
